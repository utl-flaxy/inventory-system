services:

  db:
    image: mariadb:12.2

    container_name: inventory-db

    environment:
      MARIADB_ROOT_PASSWORD: password
      MARIADB_DATABASE: asset_management

    ports:
      - "3306:3306"

    volumes:
      - mariadb_data:/var/lib/mysql

  app:
    build: .

    container_name: inventory-app

    depends_on:
      - db

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/asset_management
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password

volumes:
  mariadb_data: